<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0eeeb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="hsl(217, 91%, 50%)"/>
      <stop offset="0.25" stop-color="hsl(145, 63%, 42%)"/>
      <stop offset="0.5" stop-color="hsl(38, 92%, 50%)"/>
      <stop offset="0.75" stop-color="hsl(330, 72%, 52%)"/>
      <stop offset="1" stop-color="hsl(262, 72%, 52%)"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent stripe top -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Brand -->
  <g font-family="Georgia, 'Instrument Serif', serif" fill="#111110">
    <text x="80" y="130" font-size="28" font-family="monospace" fill="#878480" letter-spacing="3">SYSTEM DESIGN · PORTFOLIO</text>
    <text x="80" y="260" font-size="84" font-weight="400" letter-spacing="-2">
      Thirty-one problems.
    </text>
    <text x="80" y="360" font-size="84" font-weight="400" letter-spacing="-2" font-style="italic" fill="hsl(217,91%,50%)">
      Fifty concepts.
    </text>
    <text x="80" y="450" font-size="32" font-family="sans-serif" fill="#4a4845" font-weight="300">
      One searchable reference library — the system-design interview, end to end.
    </text>
  </g>

  <!-- Bottom meta -->
  <g font-family="monospace" fill="#878480" font-size="20">
    <text x="80" y="560">⌘K to search</text>
    <text x="1120" y="560" text-anchor="end">81 pages · 10 categories</text>
  </g>
</svg>
